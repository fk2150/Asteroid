<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:;">
  <title>Asteroids</title>
  <link rel="stylesheet" href="css/style.css">
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
  <div id="auth-overlay" class="auth-overlay">
    <div class="auth-box">
      <h1 class="auth-title">Zugang</h1>
      <p class="auth-desc">Bitte Passwort eingeben.</p>
      <input type="password" id="auth-password" class="auth-input" placeholder="Passwort" autocomplete="current-password" />
      <button type="button" id="auth-submit" class="btn auth-btn">Anmelden</button>
      <p id="auth-error" class="auth-error"></p>
    </div>
  </div>
  <div id="game-container">
    <canvas id="game-canvas" width="800" height="600" tabindex="0"></canvas>
    <div id="hud">
      <span id="score">Punkte: 0</span>
      <span id="lives">Leben: 3</span>
      <span id="level-display">Level: 1</span>
      <span id="highscore">Highscore: 0</span>
    </div>
    <button type="button" id="fullscreen-btn" class="fullscreen-btn" aria-label="Vollbild umschalten" title="Vollbild">
      <svg class="fullscreen-icon fullscreen-icon--enter" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="2" width="20" height="20" rx="3" ry="3"/>
        <line x1="12" y1="12" x2="5" y2="5"/>
        <line x1="12" y1="12" x2="19" y2="5"/>
        <line x1="12" y1="12" x2="19" y2="19"/>
        <line x1="12" y1="12" x2="5" y2="19"/>
        <path d="M7 5L5 5L5 7 M17 5L19 5L19 7 M19 17L19 19L17 19 M5 17L5 19L7 19"/>
      </svg>
      <svg class="fullscreen-icon fullscreen-icon--exit" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
        <rect x="4" y="4" width="16" height="16" rx="2" ry="2"/>
        <path d="M12 8v8M8 12h8"/>
        <path d="M4 4l4 4-4 4M20 4l-4 4 4 4M4 20l4-4-4-4M20 20l-4-4 4-4"/>
      </svg>
    </button>
  </div>
  <script src="js/auth.js"></script>
  <script src="js/fullscreen.js"></script>
  <script src="js/input.js"></script>
  <script src="js/sound.js"></script>
  <script src="js/highscore.js"></script>
  <script src="js/bullet.js"></script>
  <script src="js/asteroid.js"></script>
  <script src="js/ship.js"></script>
  <script src="js/ufo.js"></script>
  <script src="js/collision.js"></script>
  <script src="js/game.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
