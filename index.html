<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:;">
  <title>Asteroids</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="auth-overlay" class="auth-overlay">
    <div class="auth-box">
      <h1 class="auth-title">Zugang</h1>
      <p class="auth-desc">Bitte Passwort eingeben.</p>
      <input type="password" id="auth-password" class="auth-input" placeholder="Passwort" autocomplete="current-password" />
      <button type="button" id="auth-submit" class="btn auth-btn">Anmelden</button>
      <p id="auth-error" class="auth-error"></p>
    </div>
  </div>
  <div id="game-container">
    <canvas id="game-canvas" width="800" height="600" tabindex="0"></canvas>
    <div id="hud">
      <span id="score">Punkte: 0</span>
      <span id="lives">Leben: 3</span>
      <span id="level-display">Level: 1</span>
      <span id="highscore">Highscore: 0</span>
    </div>
    <button type="button" id="fullscreen-btn" class="fullscreen-btn" aria-label="Vollbild umschalten" title="Vollbild">
      <svg class="fullscreen-icon fullscreen-icon--enter" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
      <svg class="fullscreen-icon fullscreen-icon--exit" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v3a2 2 0 0 1 2 2h3M3 16h3a2 2 0 0 1 2 2v3"/></svg>
    </button>
  </div>
  <script src="js/auth.js"></script>
  <script src="js/fullscreen.js"></script>
  <script src="js/input.js"></script>
  <script src="js/sound.js"></script>
  <script src="js/highscore.js"></script>
  <script src="js/bullet.js"></script>
  <script src="js/asteroid.js"></script>
  <script src="js/ship.js"></script>
  <script src="js/ufo.js"></script>
  <script src="js/collision.js"></script>
  <script src="js/game.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
